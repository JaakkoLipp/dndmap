name: "${COMPOSE_PROJECT_NAME:-dnd-campaign-map}"

x-auth-environment: &auth-environment
  PUBLIC_SITE_URL: "${PUBLIC_SITE_URL:-http://localhost:3000}"
  AUTH_ENABLED: "${AUTH_ENABLED:-false}"
  # NEXT_PUBLIC_AUTH_ENABLED is read by the Next.js Edge middleware.
  # Mirrored from AUTH_ENABLED so the two never drift.
  NEXT_PUBLIC_AUTH_ENABLED: "${AUTH_ENABLED:-false}"
  LOCAL_LOGIN_ENABLED: "${LOCAL_LOGIN_ENABLED:-false}"
  AUTH_OAUTH_PROVIDERS: "${AUTH_OAUTH_PROVIDERS:-discord,google,github}"
  OAUTH_REDIRECT_BASE_URL: "${OAUTH_REDIRECT_BASE_URL:-http://localhost:8080/api/v1/auth}"
  OAUTH_DISCORD_CLIENT_ID: "${OAUTH_DISCORD_CLIENT_ID:-}"
  OAUTH_DISCORD_CLIENT_SECRET: "${OAUTH_DISCORD_CLIENT_SECRET:-}"
  OAUTH_GOOGLE_CLIENT_ID: "${OAUTH_GOOGLE_CLIENT_ID:-}"
  OAUTH_GOOGLE_CLIENT_SECRET: "${OAUTH_GOOGLE_CLIENT_SECRET:-}"
  OAUTH_GITHUB_CLIENT_ID: "${OAUTH_GITHUB_CLIENT_ID:-}"
  OAUTH_GITHUB_CLIENT_SECRET: "${OAUTH_GITHUB_CLIENT_SECRET:-}"

x-api-environment: &api-environment
  <<: *auth-environment
  APP_ENV: "${APP_ENV:-development}"
  PERSISTENCE_BACKEND: "${PERSISTENCE_BACKEND:-memory}"
  DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://dndmap:dndmap_dev_password@postgres:5432/dndmap}"
  REDIS_URL: "${REDIS_URL:-redis://:dndmap_redis_dev_password@redis:6379/0}"
  RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-false}"
  S3_BUCKET: "${S3_BUCKET:-dnd-campaign-map}"
  S3_REGION: "${S3_REGION:-us-east-1}"
  S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-dndmap_minio}"
  S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-dndmap_minio_dev_password}"
  S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://minio:9000}"
  S3_PUBLIC_ENDPOINT_URL: "${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}"
  S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
  SESSION_SECRET: "${SESSION_SECRET:-replace-with-at-least-32-random-characters}"
  JWT_SECRET: "${JWT_SECRET:-replace-with-at-least-32-random-characters-for-jwt}"
  CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:8080}"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-dndmap}"
      POSTGRES_USER: "${POSTGRES_USER:-dndmap}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-dndmap_dev_password}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-dndmap_redis_dev_password}"
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-dndmap_minio}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-dndmap_minio_dev_password}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  minio-create-bucket:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-dndmap_minio}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-dndmap_minio_dev_password}"
      S3_BUCKET: "${S3_BUCKET:-dnd-campaign-map}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        mc anonymous set none "local/$${S3_BUCKET}"
    restart: "no"
    networks:
      - app

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      args:
        API_DIR: "${API_DIR:-apps/api}"
    restart: unless-stopped
    environment:
      <<: *api-environment
      API_ASGI_APP: "${API_ASGI_APP:-app.main:app}"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    networks:
      - app

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        WEB_DIR: "${WEB_DIR:-apps/web}"
    restart: unless-stopped
    environment:
      <<: *auth-environment
      APP_ENV: "${APP_ENV:-development}"
      # Leave NEXT_PUBLIC_API_BASE_URL unset so the web app makes
      # same-origin /api/* requests routed by nginx (port 8080) or by
      # the Next.js rewrite (port 3000). Setting it to an absolute API
      # URL breaks the OAuth redirect chain (see lib/api.ts).
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
      INTERNAL_API_BASE_URL: "${INTERNAL_API_BASE_URL:-http://api:8000}"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - app

  proxy:
    profiles: ["app"]
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
